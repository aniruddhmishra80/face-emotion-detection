<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Emotion Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
        }
        .video-container {
            border: 5px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }
        img {
            display: block;
        }
    </style>
</head>
<body>
    <h1>Face Emotion Detection - Local Host</h1>
    <div class="video-container">
        <!-- The image source will be replaced continuously by the Flask server -->
        <img src="{{ url_for('video_feed') }}" width="800" height="600" alt="Video Feed">
    </div>
</body>
</html>
